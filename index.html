<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONHATCAT</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* START */
#startScreen{
position:fixed;
inset:0;
background:url('start_mobile.webp') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

@media (min-aspect-ratio:3/4){
#startScreen{
background:url('start_desktop.webp') center/cover no-repeat;
}
}

.overlay{
background:rgba(0,0,0,0.6);
padding:25px;
border-radius:15px;
}

h1{
font-size:42px;
text-shadow:0 4px 10px rgba(0,0,0,0.9);
}

h2{
text-shadow:0 2px 8px rgba(0,0,0,0.9);
}

input{
padding:12px;
font-size:16px;
border-radius:10px;
border:none;
margin-bottom:15px;
width:220px;
text-align:center;
}

button{
padding:14px 22px;
font-size:18px;
border:none;
border-radius:12px;
background:gold;
cursor:pointer;
}

/* GAME */
#game{
display:none;
width:100%;
height:100%;
position:relative;
background:#111;
}

.mouse,.coin,.doom{
position:absolute;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="startScreen">
<div class="overlay">
<h1>IRONHATCAT</h1>
<h2>Fat Mice or Total Meow Loss</h2>

<input id="playerName" placeholder="Write your name here">

<br>
<button onclick="startGame()">ENTER THE KINGDOM</button>
</div>
</div>

<div id="game"></div>

<script>
let score=0;
let running=false;
let player="";

function startGame(){

player=document.getElementById("playerName").value.trim();

if(!player){
alert("Enter your name first");
return;
}

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

running=true;
loop();
}

function spawn(type){

let el=document.createElement("div");

if(type==="mouse"){
el.innerText="🐭";
el.className="mouse";
}
if(type==="coin"){
el.innerText="🪙";
el.className="coin";
}
if(type==="doom"){
el.innerText="💩";
el.className="doom";
}

el.style.left=Math.random()*90+"%";
el.style.top=Math.random()*90+"%";

el.onclick=()=>{
if(!running)return;

if(type==="mouse"){
score+=10;
play(700);
}

if(type==="coin"){
score+=25;
play(1000);
}

if(type==="doom"){
running=false;
alert("TOTAL MEOW LOSS");
}

el.remove();
};

document.getElementById("game").appendChild(el);

setTimeout(()=>{if(el.parentNode)el.remove();},1500);
}

function loop(){

if(!running)return;

spawn("mouse");

if(Math.random()>0.6)spawn("coin");
if(Math.random()>0.85)spawn("doom");

setTimeout(loop,800);
}

function play(freq){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
let gain=ctx.createGain();
osc.frequency.value=freq;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
}

</script>

</body>
</html>
