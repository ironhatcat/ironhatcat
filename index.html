<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>IRONHATCAT</title>
<style>
  :root{
    --bg:#091019;
    --panel:rgba(8,12,18,0.82);
    --panel-strong:rgba(10,14,20,0.94);
    --line:rgba(255,255,255,0.12);
    --gold:#ffb21c;
    --gold-2:#ff8a00;
    --text:#f4f5f7;
    --muted:#c5c9d2;
    --shadow:0 18px 42px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  html,body{
    margin:0;
    padding:0;
    min-height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }

  body{
    overflow-x:hidden;
    overflow-y:auto;
    touch-action:manipulation;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,.05), transparent 18%),
      radial-gradient(circle at 85% 18%, rgba(255,255,255,.04), transparent 18%),
      linear-gradient(180deg, #09111b 0%, #0b1520 52%, #081019 100%);
  }

  .screen{
    width:100%;
  }

  /* START SCREEN */
  #startScreen{
    position:fixed;
    inset:0;
    background:#000 center / cover no-repeat;
    z-index:20;
  }
  @media (max-aspect-ratio: 3/4) {
    #startScreen { background-image:url('start_mobile.webp'); }
  }
  @media (min-aspect-ratio: 3/4) {
    #startScreen { background-image:url('start_desktop.webp'); }
  }
  #startScreen::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.38) 45%, rgba(0,0,0,.54) 100%);
  }

  .hero{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(92vw, 820px);
    text-align:center;
    padding:24px;
  }

  .title{
    margin:0;
    letter-spacing:.03em;
    font-size:clamp(38px, 8vw, 88px);
    font-weight:900;
    color:#fff;
    text-shadow:0 4px 10px rgba(0,0,0,.95), 0 12px 30px rgba(0,0,0,.5);
  }

  .subtitle{
    margin:14px 0 28px;
    font-size:clamp(20px, 3.2vw, 34px);
    color:#f3f4f6;
    text-shadow:0 2px 8px rgba(0,0,0,.95);
  }

  .btn{
    border:0;
    background:linear-gradient(180deg,var(--gold),var(--gold-2));
    color:#fff;
    border-radius:18px;
    padding:18px 28px;
    min-width:min(84vw, 420px);
    font-weight:800;
    font-size:clamp(20px, 3.5vw, 34px);
    cursor:pointer;
    box-shadow:0 12px 26px rgba(0,0,0,.35);
  }

  .btn.secondary{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.14);
    color:#fff;
    min-width:auto;
    padding:12px 16px;
    font-size:15px;
    border-radius:14px;
    box-shadow:none;
  }

  /* GAME SCREEN */
  #gameScreen{
    display:none;
    position:relative;
    min-height:100dvh;
    width:100%;
    padding-top:calc(env(safe-area-inset-top) + 10px);
    padding-bottom:calc(env(safe-area-inset-bottom) + 18px);
  }

  .game-shell{
    width:min(100%, 980px);
    margin:0 auto;
    padding:0 12px;
    display:grid;
    grid-template-rows:auto auto auto;
    gap:12px;
  }

  .hud{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    position:sticky;
    top:0;
    z-index:5;
    padding-top:4px;
    background:linear-gradient(180deg, rgba(9,16,25,.98), rgba(9,16,25,.88) 70%, rgba(9,16,25,0));
    backdrop-filter:blur(6px);
  }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    backdrop-filter:blur(8px);
  }

  .stat{
    padding:12px 10px;
    text-align:center;
  }

  .stat-label{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .stat-value{
    font-size:clamp(24px, 4vw, 34px);
    margin-top:4px;
    font-weight:900;
    color:#fff;
  }

  .arena{
    position:relative;
    overflow:hidden;
    height:min(52vh, 560px);
    min-height:320px;
    border-radius:24px;
    background:
      radial-gradient(circle at 50% -20%, rgba(255,195,0,.08), transparent 30%),
      linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
      linear-gradient(180deg, #0f1620 0%, #121a26 55%, #0c121a 100%);
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    touch-action:none;
  }

  .arena::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:34px 34px;
    opacity:.35;
    pointer-events:none;
  }

  .cat{
    position:absolute;
    left:50%;
    top:12%;
    transform:translateX(-50%);
    font-size:clamp(46px, 9vw, 74px);
    filter:drop-shadow(0 8px 16px rgba(0,0,0,.45));
    pointer-events:none;
    z-index:3;
    transition:left .1s linear, top .1s linear;
  }

  .mouse, .doom{
    position:absolute;
    width:64px;
    height:64px;
    margin-left:-32px;
    margin-top:-32px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.05);
    box-shadow:0 12px 22px rgba(0,0,0,.25);
    font-size:38px;
    user-select:none;
    cursor:pointer;
  }

  .mouse{ animation:floaty 1.6s ease-in-out infinite; }
  .doom{
    border-color:rgba(255,190,40,.45);
    box-shadow:0 0 0 2px rgba(255,190,40,.18), 0 0 28px rgba(255,190,40,.18);
    animation:doomPulse 1.4s ease-in-out infinite;
  }

  @keyframes floaty{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-6px) scale(1.03); }
  }

  @keyframes doomPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
  }

  .flash{
    position:absolute;
    width:88px;
    height:88px;
    margin-left:-44px;
    margin-top:-44px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,212,104,.38), rgba(255,212,104,0));
    pointer-events:none;
    animation:flash .35s ease-out forwards;
  }

  @keyframes flash{
    from{transform:scale(.3);opacity:1}
    to{transform:scale(1.6);opacity:0}
  }

  .bottom{
    display:grid;
    grid-template-columns:1fr auto;
    gap:12px;
    align-items:start;
  }

  .leaderboard{
    padding:14px 16px;
  }

  .leaderboard h3{
    margin:0 0 8px;
    font-size:16px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:#fff;
  }

  .leaderboard ol{
    margin:0;
    padding-left:20px;
    max-height:160px;
    overflow:auto;
  }

  .leaderboard li{
    padding:5px 0;
    color:#e9edf4;
  }

  .side-controls{
    display:flex;
    gap:10px;
    align-items:center;
  }

  .nameWrap{
    display:flex;
    gap:10px;
    align-items:center;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:10px 12px;
    box-shadow:var(--shadow);
    min-width:260px;
  }

  .nameWrap input{
    width:100%;
    border:0;
    outline:0;
    background:transparent;
    color:#fff;
    font-size:15px;
    min-width:0;
  }

  .overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:rgba(4,8,14,.72);
    backdrop-filter:blur(8px);
    z-index:6;
    overflow-y:auto;
  }

  .overlay-card{
    width:min(92vw, 520px);
    background:var(--panel-strong);
    border:1px solid var(--line);
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:24px;
    text-align:center;
    margin:auto;
  }

  .overlay-card h2{
    margin:0;
    font-size:clamp(28px, 5vw, 44px);
  }

  .overlay-card p{
    margin:12px 0 18px;
    font-size:18px;
    color:#e8ebf0;
  }

  .muted{
    color:var(--muted);
    font-size:14px;
  }

  .highlight{
    color:var(--gold);
    font-weight:800;
  }

  @media (max-width:700px){
    .game-shell{
      gap:10px;
      padding:0 10px;
    }

    .stat{
      padding:10px 8px;
      border-radius:16px;
    }

    .stat-label{
      font-size:11px;
    }

    .stat-value{
      font-size:clamp(22px, 7vw, 34px);
    }

    .arena{
      height:46vh;
      min-height:260px;
      border-radius:22px;
    }

    .mouse, .doom{
      width:58px;
      height:58px;
      margin-left:-29px;
      margin-top:-29px;
      font-size:34px;
    }

    .bottom{
      grid-template-columns:1fr;
    }

    .side-controls{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:stretch;
      margin-bottom:10px;
    }

    .nameWrap{
      min-width:0;
      width:100%;
    }

    .btn.secondary{
      min-height:56px;
      padding:0 18px;
      white-space:nowrap;
    }

    .overlay-card{
      padding:20px;
    }
  }
</style>
</head>
<body>

<section id="startScreen" class="screen">
  <div class="hero">
    <h1 class="title">IRONHATCAT</h1>
    <div class="subtitle">Fat Mice or Total Meow Loss</div>
    <button class="btn" id="enterBtn">ENTER THE KINGDOM</button>
  </div>
</section>

<section id="gameScreen" class="screen">
  <div class="game-shell">
    <div class="hud">
      <div class="card stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="scoreValue">0</div>
      </div>
      <div class="card stat">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="timeValue">30</div>
      </div>
      <div class="card stat">
        <div class="stat-label">Caught</div>
        <div class="stat-value" id="caughtValue">0</div>
      </div>
    </div>

    <div id="arena" class="arena card" aria-label="Game arena">
      <div id="cat" class="cat">🐱</div>

      <div id="resultOverlay" class="overlay">
        <div class="overlay-card">
          <h2 id="resultTitle">Round Complete</h2>
          <p id="resultText">The kingdom awaits your score.</p>
          <div class="muted" id="resultSmall">Top 10 is stored on this device.</div>
          <div style="margin-top:18px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
            <button class="btn" id="playAgainBtn" style="min-width:220px;">PLAY AGAIN</button>
            <button class="btn secondary" id="backBtn">BACK TO TITLE</button>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="card leaderboard">
        <h3>Top Hunters</h3>
        <ol id="leaderboardList"></ol>
        <div class="muted" style="margin-top:8px;">Classic mode · 30 seconds · Golden Doom ends the round instantly.</div>
      </div>

      <div class="side-controls">
        <div class="nameWrap">
          <span class="muted">Name</span>
          <input id="playerName" maxlength="16" value="Lord Ironhat" />
        </div>
        <button class="btn secondary" id="restartBtn">Restart</button>
      </div>
    </div>
  </div>
</section>

<script>
  const startScreen = document.getElementById('startScreen');
  const gameScreen = document.getElementById('gameScreen');
  const enterBtn = document.getElementById('enterBtn');
  const restartBtn = document.getElementById('restartBtn');
  const playAgainBtn = document.getElementById('playAgainBtn');
  const backBtn = document.getElementById('backBtn');
  const arena = document.getElementById('arena');
  const cat = document.getElementById('cat');
  const scoreValue = document.getElementById('scoreValue');
  const timeValue = document.getElementById('timeValue');
  const caughtValue = document.getElementById('caughtValue');
  const leaderboardList = document.getElementById('leaderboardList');
  const playerName = document.getElementById('playerName');
  const resultOverlay = document.getElementById('resultOverlay');
  const resultTitle = document.getElementById('resultTitle');
  const resultText = document.getElementById('resultText');
  const resultSmall = document.getElementById('resultSmall');

  let audioCtx = null;
  let running = false;
  let score = 0;
  let caught = 0;
  let timeLeft = 30;
  let gameTimer = null;
  let spawnTimer = null;
  let doomTimer = null;
  let activeMice = new Set();
  let activeDoom = null;

  function ensureAudio(){
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function tone(freq, duration, type='sine', volume=0.03){
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  }

  function soundEnter(){ tone(440, .10, 'triangle', .03); setTimeout(()=>tone(660,.12,'triangle',.024), 70); }
  function soundCatch(){ tone(720, .06, 'square', .025); setTimeout(()=>tone(980,.08,'triangle',.018), 40); }
  function soundOver(){ tone(330, .18, 'sawtooth', .028); setTimeout(()=>tone(220,.22,'triangle',.022), 120); }
  function soundDoom(){ tone(180, .16, 'sawtooth', .03); setTimeout(()=>tone(130,.20,'triangle',.024), 80); }

  function updateHUD(){
    scoreValue.textContent = score;
    timeValue.textContent = timeLeft;
    caughtValue.textContent = caught;
  }

  function loadBoard(){
    const board = JSON.parse(localStorage.getItem('ironhatcat_top10') || '[]');
    leaderboardList.innerHTML = '';
    if (!board.length){
      const li = document.createElement('li');
      li.textContent = 'No hunters on the board yet.';
      leaderboardList.appendChild(li);
      return;
    }
    board.forEach((entry) => {
      const li = document.createElement('li');
      li.textContent = `${entry.name} — ${entry.score}`;
      leaderboardList.appendChild(li);
    });
  }

  function saveBoard(){
    const board = JSON.parse(localStorage.getItem('ironhatcat_top10') || '[]');
    const name = (playerName.value || 'Lord Ironhat').trim().slice(0,16) || 'Lord Ironhat';
    board.push({name, score, ts: Date.now()});
    board.sort((a,b) => b.score - a.score || a.ts - b.ts);
    localStorage.setItem('ironhatcat_top10', JSON.stringify(board.slice(0,10)));
    loadBoard();
  }

  function clearMice(){
    activeMice.forEach(mouse => mouse.remove());
    activeMice.clear();
  }

  function clearDoom(){
    if (activeDoom) {
      activeDoom.remove();
      activeDoom = null;
    }
  }

  function arenaPoint(event){
    const rect = arena.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width) * 100;
    const y = ((event.clientY - rect.top) / rect.height) * 100;
    return {
      x: Math.max(8, Math.min(92, x)),
      y: Math.max(10, Math.min(86, y))
    };
  }

  function moveCat(x, y){
    cat.style.left = x + '%';
    cat.style.top = y + '%';
  }

  function flashAt(clientX, clientY){
    const rect = arena.getBoundingClientRect();
    const flash = document.createElement('div');
    flash.className = 'flash';
    flash.style.left = (clientX - rect.left) + 'px';
    flash.style.top = (clientY - rect.top) + 'px';
    arena.appendChild(flash);
    setTimeout(() => flash.remove(), 380);
  }

  function spawnMouse(){
    if (!running) return;
    if (activeMice.size >= 4) return;

    const mouse = document.createElement('button');
    mouse.className = 'mouse';
    mouse.type = 'button';
    mouse.textContent = '🐭';
    mouse.style.left = (10 + Math.random() * 80) + '%';
    mouse.style.top = (16 + Math.random() * 62) + '%';

    const timeout = setTimeout(() => {
      activeMice.delete(mouse);
      mouse.remove();
    }, 1400 + Math.random() * 700);

    mouse.addEventListener('click', (e) => {
      if (!running) return;
      ensureAudio();
      soundCatch();
      const p = arenaPoint(e);
      moveCat(p.x, Math.max(8, p.y - 10));
      flashAt(e.clientX, e.clientY);

      score += 10;
      caught += 1;
      updateHUD();

      clearTimeout(timeout);
      activeMice.delete(mouse);
      mouse.remove();
    });

    activeMice.add(mouse);
    arena.appendChild(mouse);
  }

  function spawnDoom(){
    if (!running || activeDoom) return;
    if (Math.random() > 0.34) return;

    const doom = document.createElement('button');
    doom.className = 'doom';
    doom.type = 'button';
    doom.textContent = '💩';
    doom.style.left = (12 + Math.random() * 76) + '%';
    doom.style.top = (20 + Math.random() * 56) + '%';

    const timeout = setTimeout(() => {
      if (activeDoom === doom) activeDoom = null;
      doom.remove();
    }, 1800);

    doom.addEventListener('click', (e) => {
      if (!running) return;
      ensureAudio();
      soundDoom();
      flashAt(e.clientX, e.clientY);
      clearTimeout(timeout);
      if (activeDoom === doom) activeDoom = null;
      doom.remove();
      timeLeft = 0;
      updateHUD();
      endGame(true);
    });

    activeDoom = doom;
    arena.appendChild(doom);
  }

  function endGame(doomHit=false){
    if (!running) return;
    running = false;
    clearInterval(gameTimer);
    clearInterval(spawnTimer);
    clearInterval(doomTimer);
    clearMice();
    clearDoom();
    ensureAudio();
    soundOver();
    saveBoard();

    if (doomHit) {
      resultTitle.textContent = 'Total Meow Loss';
      resultText.innerHTML = `Cursed gold. Cursed fate. Final score: <span class="highlight">${score}</span>.`;
      resultSmall.textContent = 'Golden Doom ends the round instantly.';
    } else {
      resultTitle.textContent = score >= 200 ? 'Royal Fortune' : (score >= 100 ? 'Strong Hunt' : 'Total Meow Loss');
      resultText.innerHTML = `You caught <span class="highlight">${caught}</span> mice and banked <span class="highlight">${score}</span> points.`;
      resultSmall.textContent = 'Classic mode complete. Online Top 10 can be added next.';
    }
    resultOverlay.style.display = 'flex';
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  function startGame(){
    ensureAudio();
    soundEnter();
    startScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    resultOverlay.style.display = 'none';

    score = 0;
    caught = 0;
    timeLeft = 30;
    running = true;
    updateHUD();
    clearMice();
    clearDoom();
    moveCat(50, 12);

    clearInterval(gameTimer);
    clearInterval(spawnTimer);
    clearInterval(doomTimer);

    window.scrollTo({top: 0, behavior: 'auto'});

    spawnMouse();
    spawnTimer = setInterval(() => {
      spawnMouse();
      if (Math.random() > 0.55) spawnMouse();
    }, 700);

    doomTimer = setInterval(() => {
      spawnDoom();
    }, 2600);

    gameTimer = setInterval(() => {
      timeLeft -= 1;
      updateHUD();
      if (timeLeft <= 0) endGame(false);
    }, 1000);
  }

  function backToTitle(){
    running = false;
    clearInterval(gameTimer);
    clearInterval(spawnTimer);
    clearInterval(doomTimer);
    clearMice();
    clearDoom();
    resultOverlay.style.display = 'none';
    gameScreen.style.display = 'none';
    startScreen.style.display = 'block';
    window.scrollTo({top: 0, behavior: 'auto'});
  }

  arena.addEventListener('click', (e) => {
    if (!running || e.target.classList.contains('mouse') || e.target.classList.contains('doom')) return;
    const p = arenaPoint(e);
    moveCat(p.x, Math.max(8, p.y - 10));
  });

  restartBtn.addEventListener('click', startGame);
  enterBtn.addEventListener('click', startGame);
  playAgainBtn.addEventListener('click', startGame);
  backBtn.addEventListener('click', backToTitle);

  loadBoard();
  updateHUD();
</script>
</body>
</html>
