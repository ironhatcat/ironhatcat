<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONHATCAT</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

#startScreen {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
}

/* MOBILE IMAGE */
@media (max-aspect-ratio: 3/4) {
  #startScreen {
    background-image:url('start_mobile.webp');
  }
}

/* DESKTOP IMAGE */
@media (min-aspect-ratio: 3/4) {
  #startScreen {
    background-image:url('start_desktop.webp');
  }
}

.overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

h1 {
  font-size:42px;
  margin:0;
  color:white;
  text-shadow: 0px 4px 10px rgba(0,0,0,0.9);
}

h2 {
  font-size:18px;
  margin:10px 0 20px;
  text-shadow: 0px 2px 8px rgba(0,0,0,0.9);
}

button {
  padding:16px 28px;
  font-size:18px;
  background:#ff7a00;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
}

</style>
</head>

<body>

<div id="startScreen">
  <div class="overlay">
    <h1>IRONHATCAT</h1>
    <h2>Fat Mice or Total Meow Loss</h2>
    <button onclick="startGame()">ENTER THE KINGDOM</button>
  </div>
</div>

<script>
function startGame(){
  alert("Next version coming: Game + Sound + Leaderboard 🎮");
}
</script>

</body>
</html>
