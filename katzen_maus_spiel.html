<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Katzenjagd – iPhone Version</title>
  <style>
    :root{
      --bg:#fff8ef;
      --panel:#ffffff;
      --text:#222;
      --accent:#ff8a65;
      --accent2:#ffd166;
      --good:#2e7d32;
      --line:#eadfce;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color: transparent;}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#fffaf3 0%, #fff2df 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      height:100%;
      overflow:hidden;
      touch-action:manipulation;
    }
    body{
      display:flex;
      justify-content:center;
      align-items:stretch;
    }
    .app{
      width:100%;
      max-width:430px;
      height:100dvh;
      padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .topbar{
      background:rgba(255,255,255,.9);
      border:2px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      margin-top:8px;
    }
    .stat{
      text-align:center;
      background:#fffaf6;
      border-radius:14px;
      padding:8px 6px;
    }
    .stat .label{
      font-size:12px;
      opacity:.7;
    }
    .stat .value{
      font-size:22px;
      font-weight:800;
      margin-top:2px;
    }
    .controls{
      display:flex;
      gap:8px;
      align-items:center;
    }
    input{
      flex:1;
      min-width:0;
      padding:14px 14px;
      font-size:16px;
      border-radius:14px;
      border:2px solid var(--line);
      background:white;
    }
    button{
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:16px;
      font-weight:800;
      background:var(--accent);
      color:white;
      box-shadow:0 6px 14px rgba(255,138,101,.3);
    }
    button.secondary{
      background:#fff;
      color:var(--text);
      border:2px solid var(--line);
      box-shadow:none;
    }
    #gameArea{
      position:relative;
      flex:1;
      min-height:320px;
      border-radius:22px;
      overflow:hidden;
      border:3px solid #efdfc8;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.7), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.6), transparent 22%),
        linear-gradient(180deg,#dff7ff 0 28%, #b8eb97 28% 100%);
      box-shadow:0 10px 24px rgba(0,0,0,.08);
      user-select:none;
      touch-action:none;
    }
    .cat{
      position:absolute;
      width:64px;
      height:64px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:44px;
      transform:translate(-50%,-50%);
      pointer-events:none;
      filter:drop-shadow(0 4px 2px rgba(0,0,0,.15));
      z-index:3;
      transition:left .08s linear, top .08s linear;
    }
    .mouse{
      position:absolute;
      width:54px;
      height:54px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:34px;
      background:rgba(255,255,255,.32);
      transform:translate(-50%,-50%);
      z-index:2;
      animation:pulse 1.1s infinite ease-in-out;
      user-select:none;
    }
    @keyframes pulse{
      0%,100%{transform:translate(-50%,-50%) scale(1);}
      50%{transform:translate(-50%,-50%) scale(1.08);}
    }
    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:24px;
      background:rgba(255,248,239,.83);
      backdrop-filter:blur(3px);
      z-index:4;
    }
    .overlay h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.05;
    }
    .overlay p{
      margin:0 0 14px;
      font-size:17px;
      max-width:280px;
    }
    .tip{
      background:white;
      border:2px solid var(--line);
      border-radius:16px;
      padding:10px 12px;
      font-size:14px;
      line-height:1.35;
      box-shadow:0 6px 18px rgba(0,0,0,.05);
    }
    .bottom{
      background:rgba(255,255,255,.9);
      border:2px solid var(--line);
      border-radius:18px;
      padding:10px 12px 14px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      margin-bottom:8px;
    }
    .bottom h2{
      margin:4px 0 8px;
      font-size:18px;
    }
    ol{
      margin:0;
      padding-left:22px;
      max-height:140px;
      overflow:auto;
    }
    li{
      padding:5px 0;
      font-size:15px;
    }
    .tiny{
      font-size:12px;
      opacity:.72;
      margin-top:8px;
      line-height:1.35;
    }
    .flash{
      position:absolute;
      width:76px;
      height:76px;
      margin-left:-38px;
      margin-top:-38px;
      border-radius:50%;
      background:rgba(255,255,255,.6);
      animation:flash .28s ease-out forwards;
      pointer-events:none;
      z-index:5;
    }
    @keyframes flash{
      from{transform:scale(.2); opacity:1;}
      to{transform:scale(1.4); opacity:0;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="stat"><div class="label">Punkte</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">Zeit</div><div class="value" id="time">30</div></div>
      <div class="stat"><div class="label">Treffer</div><div class="value" id="hits">0</div></div>
    </div>

    <div class="controls">
      <input id="playerName" maxlength="18" placeholder="Dein Name" value="Spieler" />
      <button id="startBtn">Start</button>
      <button id="restartBtn" class="secondary">Neu</button>
    </div>

    <div id="gameArea" aria-label="Spielfeld">
      <div id="cat" class="cat" style="left:50%; top:75%;">🐱</div>

      <div id="startOverlay" class="overlay">
        <h1>Katzenjagd</h1>
        <p>Tippe die Mäuse so schnell wie möglich an.</p>
        <div class="tip">
          Auf dem iPhone läuft das Spiel komplett per Touch.<br>
          Jede Maus bringt <strong>10 Punkte</strong>. Runde: <strong>30 Sekunden</strong>.
        </div>
      </div>
    </div>

    <div class="bottom">
      <h2>Rangliste</h2>
      <ol id="leaderboard"></ol>
      <div class="tiny">Die Rangliste wird lokal auf diesem Gerät im Browser gespeichert.</div>
    </div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const cat = document.getElementById("cat");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const hitsEl = document.getElementById("hits");
    const playerNameInput = document.getElementById("playerName");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leaderboardEl = document.getElementById("leaderboard");
    const overlay = document.getElementById("startOverlay");

    let score = 0;
    let hits = 0;
    let timeLeft = 30;
    let running = false;
    let gameTimer = null;
    let spawnTimer = null;
    let catX = 50;
    let catY = 75;

    function updateHUD(){
      scoreEl.textContent = score;
      hitsEl.textContent = hits;
      timeEl.textContent = timeLeft;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function moveCatPercent(xPercent, yPercent){
      catX = clamp(xPercent, 8, 92);
      catY = clamp(yPercent, 14, 90);
      cat.style.left = catX + "%";
      cat.style.top = catY + "%";
    }

    function pointToPercent(clientX, clientY){
      const r = gameArea.getBoundingClientRect();
      return {
        x: ((clientX - r.left) / r.width) * 100,
        y: ((clientY - r.top) / r.height) * 100,
      };
    }

    function createFlash(x, y){
      const f = document.createElement("div");
      f.className = "flash";
      f.style.left = x + "px";
      f.style.top = y + "px";
      gameArea.appendChild(f);
      setTimeout(()=>f.remove(), 300);
    }

    function spawnMouse(){
      if(!running) return;
      const m = document.createElement("div");
      m.className = "mouse";
      m.textContent = "🐭";

      const x = 10 + Math.random() * 80;
      const y = 18 + Math.random() * 64;
      m.style.left = x + "%";
      m.style.top = y + "%";

      const removeMouse = () => {
        if (m.parentNode) m.remove();
      };

      const catchMouse = (evt) => {
        evt.preventDefault();
        evt.stopPropagation();

        const touch = evt.changedTouches ? evt.changedTouches[0] : evt;
        const px = touch.clientX;
        const py = touch.clientY;
        const p = pointToPercent(px, py);
        moveCatPercent(p.x, p.y);

        score += 10;
        hits += 1;
        updateHUD();
        createFlash(px - gameArea.getBoundingClientRect().left, py - gameArea.getBoundingClientRect().top);
        removeMouse();
      };

      m.addEventListener("touchstart", catchMouse, {passive:false});
      m.addEventListener("click", catchMouse);
      gameArea.appendChild(m);

      setTimeout(removeMouse, 1400 + Math.random() * 800);
    }

    function clearMice(){
      gameArea.querySelectorAll(".mouse").forEach(m => m.remove());
    }

    function loadLeaderboard(){
      const board = JSON.parse(localStorage.getItem("katzenjagd_leaderboard") || "[]");
      leaderboardEl.innerHTML = "";
      if(board.length === 0){
        const li = document.createElement("li");
        li.textContent = "Noch kein Eintrag";
        leaderboardEl.appendChild(li);
        return;
      }
      board.slice(0,10).forEach(entry => {
        const li = document.createElement("li");
        li.textContent = `${entry.name} – ${entry.score} Punkte`;
        leaderboardEl.appendChild(li);
      });
    }

    function saveScore(){
      const name = (playerNameInput.value || "Spieler").trim().slice(0,18) || "Spieler";
      const board = JSON.parse(localStorage.getItem("katzenjagd_leaderboard") || "[]");
      board.push({name, score, ts: Date.now()});
      board.sort((a,b) => b.score - a.score || a.ts - b.ts);
      localStorage.setItem("katzenjagd_leaderboard", JSON.stringify(board.slice(0,20)));
      loadLeaderboard();
    }

    function endGame(){
      running = false;
      clearInterval(gameTimer);
      clearInterval(spawnTimer);
      clearMice();
      saveScore();

      overlay.innerHTML = `
        <h1>Fertig! 🎉</h1>
        <p><strong>${score}</strong> Punkte mit <strong>${hits}</strong> gefangenen Mäusen.</p>
        <div class="tip">Tippe auf <strong>Start</strong>, um sofort noch eine Runde zu spielen.</div>
      `;
      overlay.style.display = "flex";
    }

    function startGame(){
      score = 0;
      hits = 0;
      timeLeft = 30;
      running = true;
      updateHUD();
      overlay.style.display = "none";
      clearMice();
      moveCatPercent(50, 75);

      clearInterval(gameTimer);
      clearInterval(spawnTimer);

      spawnMouse();
      spawnTimer = setInterval(() => {
        const count = gameArea.querySelectorAll(".mouse").length;
        if (count < 3) spawnMouse();
        if (Math.random() > 0.45) spawnMouse();
      }, 650);

      gameTimer = setInterval(() => {
        timeLeft -= 1;
        updateHUD();
        if(timeLeft <= 0){
          endGame();
        }
      }, 1000);
    }

    function softReset(){
      running = false;
      clearInterval(gameTimer);
      clearInterval(spawnTimer);
      clearMice();
      score = 0;
      hits = 0;
      timeLeft = 30;
      updateHUD();
      moveCatPercent(50, 75);
      overlay.innerHTML = `
        <h1>Katzenjagd</h1>
        <p>Tippe die Mäuse so schnell wie möglich an.</p>
        <div class="tip">
          Auf dem iPhone läuft das Spiel komplett per Touch.<br>
          Jede Maus bringt <strong>10 Punkte</strong>. Runde: <strong>30 Sekunden</strong>.
        </div>
      `;
      overlay.style.display = "flex";
    }

    gameArea.addEventListener("touchstart", (evt) => {
      if(!running) return;
      const t = evt.changedTouches[0];
      const p = pointToPercent(t.clientX, t.clientY);
      moveCatPercent(p.x, p.y);
    }, {passive:true});

    gameArea.addEventListener("touchmove", (evt) => {
      if(!running) return;
      const t = evt.changedTouches[0];
      const p = pointToPercent(t.clientX, t.clientY);
      moveCatPercent(p.x, p.y);
    }, {passive:true});

    gameArea.addEventListener("click", (evt) => {
      if(!running) return;
      const p = pointToPercent(evt.clientX, evt.clientY);
      moveCatPercent(p.x, p.y);
    });

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", softReset);

    loadLeaderboard();
    updateHUD();
    moveCatPercent(50, 75);
  </script>
</body>
</html>
